---
- name: Print Hello World on All Nodes
  hosts: all
  tasks:
    - name: Hello World
      debug:

- name: Print Peter and May on ALL Nodes
  hosts: all
  tasks:
    - name: Peter and May
      debug:
        msg:
          - "Peter"
          - "May"

- name: Print Byebye World on ALL Nodes
  hosts: all
  tasks:
    - name: Byebye World
      debug:
        msg: "Byebye World"
