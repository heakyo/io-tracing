version: '3.8'

services:
  jenkins:
    build: .
    container_name: jenkins-hello
    user: root
    network_mode: host
    volumes:
      - jenkins_home:/var/jenkins_home
      - .:/var/jenkins_home/project
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    restart: unless-stopped

  buildweb:
    build: ./buildweb
    container_name: mybuildweb
    network_mode: host
    volumes:
      - jenkins_home:/var/jenkins_home:ro
    environment:
      - BUILDS_DIR=/var/jenkins_home/buildweb_data
      - BUILDWEB_PORT=9090
    depends_on:
      - jenkins
    restart: unless-stopped

volumes:
  jenkins_home:
